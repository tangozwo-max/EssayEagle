</div>

const SK='bib_v3';
function load(){try{return JSON.parse(localStorage.getItem(SK))||{};}catch(e){return {};}}
function save(s){localStorage.setItem(SK,JSON.stringify(s));}
let ST=load();

const SLABELS={pending:'⏳ Ausstehend',pdf:'✅ PDF',html:'📄 HTML',noaccess:'🔒 Kein Zugriff',problem:'❌ Problem'};
const SDOTS={pending:'s-pending',pdf:'s-pdf',html:'s-html',noaccess:'s-noaccess',problem:'s-problem'};

function es(idx){return ST[idx]||{status:'pending',filename:'',notes:''};}

function card(e){
  const s=es(e.idx);
  const lk=[];
  if(e.url) lk.push(`<a class="lnk lnk-u" href="${e.url}" target="_blank">🔗 URL</a>`);
  if(e.doi) lk.push(`<a class="lnk lnk-d" href="https://doi.org/${e.doi}" target="_blank">DOI</a>`);
  if(e.pdf_url) lk.push(`<a class="lnk lnk-p" href="${e.pdf_url}" target="_blank">📥 PDF</a>`);
  return `<div class="card" id="c${e.idx}" data-idx="${e.idx}" data-st="${s.status}" data-q="${(e.title+' '+e.authors).toLowerCase()}">
  <div class="card-head" onclick="tog(${e.idx})">
    <div class="card-num">${e.idx+1}</div>
    <div class="card-main">
      <div class="card-title">${e.title}</div>
      <div class="card-meta">${e.authors} (${e.year})${e.journal?' · <em>'+e.journal+'</em>':''}</div>
      <div class="card-links">${lk.join('')}</div>
    </div>
    <div class="card-right">
      <span class="slbl"><span class="sdot ${SDOTS[s.status]}" id="dot${e.idx}"></span><span id="sl${e.idx}">${SLABELS[s.status]}</span></span>
      ${s.filename?`<span style="font-size:10px;color:#94a3b8;font-family:monospace">${s.filename}</span>`:''}
    </div>
  </div>
  <div class="card-body" id="b${e.idx}">
    <div class="hvbox">
      <span class="hvlbl">Harvard-Name:</span>
      <span class="hvname">${e.harvard}</span>
      <button class="copybtn" id="cb${e.idx}" onclick="cpHv(${e.idx},event)">📋 Kopieren</button>
    </div>
    <div class="frow">
      <div class="fg" style="flex:2">
        <label>Gespeicherter Dateiname (mit Endung .pdf / .html)</label>
        <input type="text" id="fn${e.idx}" value="${(s.filename||'').replace(/"/g,'&quot;')}" placeholder="z.B. reiss_2013_artikel.pdf" oninput="upd(${e.idx})">
      </div>
      <div class="fg">
        <label>Status</label>
        <select id="st${e.idx}" onchange="upd(${e.idx})">
          ${Object.entries(SLABELS).map(([v,l])=>`<option value="${v}"${s.status===v?' selected':''}>${l}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="frow">
      <div class="fg">
        <label>Notizen (optional)</label>
        <textarea id="nt${e.idx}" oninput="upd(${e.idx})">${s.notes||''}</textarea>
      </div>
    </div>
    <span class="savedlbl" id="sv${e.idx}">✓ Gespeichert</span>
  </div>
</div>`;
}

function tog(idx){document.getElementById('b'+idx).classList.toggle('open');}

function upd(idx){
  const fn=document.getElementById('fn'+idx).value.trim();
  const st=document.getElementById('st'+idx).value;
  const nt=document.getElementById('nt'+idx).value;
  ST[idx]={status:st,filename:fn,notes:nt};
  save(ST);
  const card=document.getElementById('c'+idx);
  card.dataset.st=st;
  document.getElementById('dot'+idx).className='sdot '+SDOTS[st];
  document.getElementById('sl'+idx).textContent=SLABELS[st];
  const sv=document.getElementById('sv'+idx);
  sv.classList.add('show');
  setTimeout(()=>sv.classList.remove('show'),1500);
  updateStats();
}

function cpHv(idx,ev){
  ev.stopPropagation();
  const e=DATA[idx];
  const fn=document.getElementById('fn'+idx).value.trim();
  const ext=fn&&fn.includes('.')?'.'+fn.split('.').pop():'';
  navigator.clipboard.writeText(e.harvard+ext);
  const b=document.getElementById('cb'+idx);
  b.textContent='✓ Kopiert!';b.classList.add('ok');
  setTimeout(()=>{b.textContent='📋 Kopieren';b.classList.remove('ok');},2000);
}

function filter(){
  const q=document.getElementById('qBox').value.toLowerCase();
  const sf=document.getElementById('sfilt').value;
  let n=0;
  document.querySelectorAll('.card').forEach(c=>{
    const show=(!q||c.dataset.q.includes(q))&&(!sf||c.dataset.st===sf);
    c.style.display=show?'':'none';
    if(show)n++;
  });
  document.getElementById('cntLbl').textContent=n<DATA.length?n+' angezeigt':'';
}

function updateStats(){
  const c={pending:0,pdf:0,html:0,noaccess:0,problem:0};
  DATA.forEach(e=>{c[(ST[e.idx]||{}).status||'pending']++;});
  const done=c.pdf+c.html+c.noaccess+c.problem;
  const tot=DATA.length;
  document.getElementById('pFill').style.width=(done/tot*100)+'%';
  document.getElementById('statsBar').innerHTML=
    `<span class="badge b-pdf">✅ PDF: ${c.pdf}</span>`+
    `<span class="badge b-html">📄 HTML: ${c.html}</span>`+
    `<span class="badge b-no">🔒 Kein Zugriff: ${c.noaccess}</span>`+
    `<span class="badge b-err">❌ Fehler: ${c.problem}</span>`+
    `<span class="badge b-pend">⏳ Offen: ${c.pending}</span>`+
    `<span style="color:rgba(255,255,255,.55);font-size:11px;margin-left:4px">${done}/${tot}</span>`;
}

function openExport(){
  const lines=[],json=[];
  DATA.forEach(e=>{
    const s=ST[e.idx]||{};
    if(s.filename){
      const ext=s.filename.includes('.')?'.'+s.filename.split('.').pop():'';
      const nname=e.harvard+ext;
      lines.push(`${s.filename}  →  ${nname}`);
      json.push({original:s.filename,harvard:nname,status:s.status,doi:e.doi,title:e.title,authors:e.authors,year:e.year});
    }
  });
  document.getElementById('expPre').textContent=lines.length?lines.join('\n'):'(Noch keine Dateinamen eingetragen — öffne Einträge und trage den gespeicherten Dateinamen ein.)';
  document.getElementById('expModal')._j=json;
  document.getElementById('expModal').classList.remove('hidden');
}
function closeExport(){document.getElementById('expModal').classList.add('hidden');}
function copyExp(){navigator.clipboard.writeText(document.getElementById('expPre').textContent);}
function dlExp(){
  const blob=new Blob([JSON.stringify(document.getElementById('expModal')._j||[],null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='rename_mapping.json';a.click();
}

document.getElementById('list').innerHTML=DATA.map(card).join('');
updateStats();

  const box=document.createElement('div');

    <strong style="color:#fbbf24">🔒 Kein-Zugriff-Einträge (${noac.length}) — für Claude Code kopieren:</strong>
    <button onclick="navigator.clipboard.writeText(this.closest('div').nextElementSibling.value);this.textContent='✓ Kopiert!';setTimeout(()=>this.textContent='📋 Kopieren',2000)" style="padding:4px 12px;background:#f59e0b;color:#1e293b;border:none;border-radius:4px;cursor:pointer;font-weight:600">📋 Kopieren</button>
    <button onclick="this.closest('div').parentElement.remove()" style="padding:4px 10px;background:#334155;color:#94a3b8;border:none;border-radius:4px;cursor:pointer;margin-left:6px">✕</button>
  </div>
  <textarea readonly style="width:100%;height:80px;background:#0f172a;color:#4ade80;border:none;padding:8px;font-family:monospace;font-size:11px;border-radius:4px;resize:none">${lines}</textarea>`;
